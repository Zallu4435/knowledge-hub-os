# ============================================================
# Nginx Reverse Proxy — Knowledge Hub OS (Production)
# ============================================================
# Runs as a Docker container in docker-compose.prod.yml.
# Provides:
#   - Single public entry point on port 80 (and 443 with certbot)
#   - Routes all traffic to the right internal service
#   - Hides internal ports from the public internet
#   - GZIP compression for frontend assets
#   - WebSocket support for Next.js HMR (if ever dev mode is used)
# ============================================================

# Tune worker processes to match available CPU cores (4 on Oracle ARM)
worker_processes auto;

events {
    worker_connections 1024;
    use epoll;              # Most efficient on Linux (Oracle's Ubuntu)
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes_sent":$bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_addr":"$upstream_addr"'
        '}';

    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log  warn;

    # ── Performance ───────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         text/plain text/css application/json
                       application/javascript text/xml
                       application/xml application/xml+rss text/javascript;
    gzip_min_length    1000;

    # ── Security headers (applied to all responses) ───────────
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Rate limiting — protect auth endpoints from brute-force
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

    # ─────────────────────────────────────────────────────────
    # UPSTREAM DEFINITIONS
    # These must match the Docker Compose service names and ports.
    # ─────────────────────────────────────────────────────────
    upstream frontend {
        server frontend:3000;
        keepalive 16;
    }

    upstream api_gateway {
        server api-gateway:3000;
        keepalive 16;
    }

    upstream auth_service {
        server auth-service:3001;
        keepalive 16;
    }

    upstream goal_service {
        server goal-service:3002;
        keepalive 16;
    }

    upstream ai_service {
        server ai-service:8000;
        keepalive 8;
    }

    # ─────────────────────────────────────────────────────────
    # SERVER BLOCK
    # Replace server_name with your domain or VM public IP
    # ─────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;      # Catch-all: replace with yourdomain.com

        client_max_body_size 10M;

        # ── /api/auth/* → Auth Service (:3001) ───────────────
        # Rate-limited to prevent brute-force login attacks
        location /api/auth/ {
            limit_req zone=auth_limit burst=20 nodelay;
            proxy_pass         http://auth_service/auth/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── /api/goals/* → Goal Service (:3002) ──────────────
        location /api/goals/ {
            proxy_pass         http://goal_service/goals/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── /api/ai/* → AI Service (:8000) ───────────────────
        # Longer timeout because LLM inference can take up to 30s
        location /api/ai/ {
            proxy_pass         http://ai_service/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;   # LLM calls can be slow
            proxy_connect_timeout 10s;
        }

        # ── /api/* → API Gateway (:3000) — catch-all for gateway
        location /api/ {
            proxy_pass         http://api_gateway/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── / → Next.js Frontend (:4000 → container :3000) ──
        # WebSocket support for Next.js
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 30s;
        }

        # ── Block access to internal observability UIs ────────
        # These should NEVER be accessible from the public internet
        location ~ ^/(metrics|grafana|jaeger|prometheus)/ {
            return 403;
        }
    }
}
