# ============================================================
# Knowledge Hub OS — Production Docker Compose
# Built via: bazel run //apps/<service>:tarball
# Standards: resource limits, health checks, network isolation,
#            log rotation, graceful shutdown, node:20-slim base
# ============================================================

networks:
  # Public-facing: frontend → gateway
  frontend_net:
    driver: bridge
  # Internal microservices: gateway → services
  backend_net:
    driver: bridge
  # Infrastructure only: services → kafka/redis
  infra_net:
    driver: bridge
  # Observability: Prometheus, Grafana, Jaeger — can reach all services
  obs_net:
    driver: bridge

# ─────────────────────────────────────────────
# SHARED LOGGING CONFIG (reused via YAML anchor)
# ─────────────────────────────────────────────
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

# ─────────────────────────────────────────────
# NODE.JS HEALTH CHECK (no curl in slim images)
# Uses Node.js built-in http module — zero extra tools needed
# ─────────────────────────────────────────────
x-node-healthcheck: &node-healthcheck
  test:
    - "CMD"
    - "node"
    - "-e"
    - "require('http').get({host:'localhost',port:process.env.PORT||3000,path:'/health',timeout:2000},r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"
  interval: 15s
  timeout: 5s
  retries: 5
  start_period: 30s

services:

  # ─────────────────────────────────────────────
  # INFRASTRUCTURE
  # ─────────────────────────────────────────────

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.19
    container_name: redpanda-broker
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      # expose Prometheus-compatible metrics on 9644
      - --prometheus-addr 0.0.0.0:9644
    ports:
      - "9092:9092"
      - "29092:29092"
      - "9644:9644" # Prometheus metrics
    networks:
      - infra_net
      - obs_net
    healthcheck:
      test: [ "CMD", "rpk", "cluster", "info", "--brokers=localhost:9092" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1.2G
          cpus: "1.0"
    logging: *default-logging
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: knowledgehub-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    networks:
      - infra_net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 300M
          cpus: "0.5"
    logging: *default-logging
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # BACKEND MICROSERVICES
  # ─────────────────────────────────────────────

  auth-service:
    image: knowledgehub/auth-service:latest
    container_name: knowledgehub-auth
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      KAFKA_BROKER_URL: redpanda:29092
      REDIS_URL: redis://redis:6379
      # ── Observability ──────────────────────────
      OTEL_SERVICE_NAME: auth-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_TRACES_EXPORTER: otlp
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend_net
      - infra_net
      - obs_net
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get({host:'localhost',port:3001,path:'/auth/health',timeout:2000},r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging: *default-logging
    restart: unless-stopped

  goal-service:
    image: knowledgehub/goal-service:latest
    container_name: knowledgehub-goal
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      KAFKA_BROKER_URL: redpanda:29092
      REDIS_URL: redis://redis:6379
      # ── Observability ──────────────────────────
      OTEL_SERVICE_NAME: goal-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_TRACES_EXPORTER: otlp
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend_net
      - infra_net
      - obs_net
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get({host:'localhost',port:3002,path:'/health',timeout:2000},r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging: *default-logging
    restart: unless-stopped

  ai-service:
    image: knowledgehub/ai-service:latest
    container_name: knowledgehub-ai
    ports:
      - "8000:8000"
    environment:
      MONGO_URI: ${MONGO_URI}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      KAFKA_BROKER_URL: redpanda:29092
      # ── Observability ──────────────────────────
      OTEL_SERVICE_NAME: ai-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_TRACES_EXPORTER: otlp
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - backend_net
      - infra_net
      - obs_net
    healthcheck:
      # Python/FastAPI: use wget (available in python:slim) or a simple TCP check via bash
      test: [ "CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" 2>/dev/null && echo ok || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    logging: *default-logging
    restart: unless-stopped

  api-gateway:
    image: knowledgehub/api-gateway:latest
    container_name: knowledgehub-gateway
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      KAFKA_BROKER_URL: redpanda:29092
      REDIS_URL: redis://redis:6379
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      # ── Observability ──────────────────────────
      OTEL_SERVICE_NAME: api-gateway
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_TRACES_EXPORTER: otlp
    depends_on:
      auth-service:
        condition: service_healthy
      goal-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    networks:
      - frontend_net
      - backend_net
      - infra_net
      - obs_net
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get({host:'localhost',port:3000,path:'/users/health',timeout:2000},r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging: *default-logging
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # FRONTEND
  # ─────────────────────────────────────────────

  frontend:
    image: knowledgehub/frontend:latest
    container_name: knowledgehub-frontend
    ports:
      - "4000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_GATEWAY_URL: http://api-gateway:3000
      NEXT_PUBLIC_AUTH_URL: http://auth-service:3001
      NEXT_PUBLIC_GOAL_SERVICE_URL: http://goal-service:3002
      NEXT_PUBLIC_AI_SERVICE_URL: http://ai-service:8000
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - frontend_net
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get({host:'localhost',port:3000,path:'/',timeout:2000},r=>{process.exit(r.statusCode<500?0:1)}).on('error',()=>process.exit(1))"
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging: *default-logging
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # OBSERVABILITY STACK (Phase 12)
  # ─────────────────────────────────────────────

  # ── Jaeger — Distributed Tracing ─────────────
  # UI: http://localhost:16686
  # Accepts OTLP/HTTP on 4318, OTLP/gRPC on 4317
  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: knowledgehub-jaeger
    ports:
      - "16686:16686" # Jaeger UI
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
      - "14269:14269" # Jaeger admin / health
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      # Keep traces for 72 hours in memory (switch to elasticsearch for prod)
      SPAN_STORAGE_TYPE: memory
      MEMORY_MAX_TRACES: "50000"
    networks:
      - obs_net
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:14269/ready || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging: *default-logging
    restart: unless-stopped

  # ── Prometheus — Metrics Store ────────────────
  # UI: http://localhost:9090
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: knowledgehub-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle # POST /-/reload to hot-reload config
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - obs_net
    depends_on:
      - jaeger
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging: *default-logging
    restart: unless-stopped

  # ── Grafana — Metrics Dashboard ───────────────
  # UI: http://localhost:3030  (admin / admin)
  grafana:
    image: grafana/grafana:10.4.2
    container_name: knowledgehub-grafana
    ports:
      - "3030:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: ""
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    networks:
      - obs_net
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging: *default-logging
    restart: unless-stopped

  # ── Redis Exporter — Redis → Prometheus bridge ─
  # No UI; Prometheus scrapes it on port 9121
  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: knowledgehub-redis-exporter
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - infra_net
      - obs_net
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.1"
    logging: *default-logging
    restart: unless-stopped

# ─────────────────────────────────────────────
# NAMED VOLUMES (persist Prometheus & Grafana data)
# ─────────────────────────────────────────────
volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
